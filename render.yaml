services:
  - type: web
    name: fx-pulse-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO

  - type: web
    name: fx-pulse-web
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: .
    plan: free
